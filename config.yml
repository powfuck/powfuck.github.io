baseURL: "https://powfuck.github.io"
languageCode: en-us
title: Powfuck - Portofolio
theme: PaperMod

menu:
  main:
    - identifier: archives
      name: Archives
      url: /archives
      weight: 10
    - identifier: search
      name: Search
      url: /search
      weight: 10
    - identifier: project
      name: Project
      url: /project
      weight: 10

params:
  title: powfu - Personal Page
  description: personal website for powfuck
  author: It's iPowfu
  images: [images/gh-profile.jpg]
  ShowBreadCrumbs: true
  ShowReadingTime: true
  ShowToc: true
  ShowPostNavLinks: true
  defaultTheme: dark

  profileMode:
    enabled: true
    title: Powfu Haruchiyo
    subtitle: a lazy guy who made it only when need it
    imageUrl: images/gh-profile.jpg
    imageTitle: image-profile
    imageWidth: 140
    imageHeight: 140
    buttons:
      - name: Blog
        url: /posts

  socialIcons:
    - name: facebook
      url: #
    - name: "github"
      url: https://github.com/powfuck
    - name: twitter
      url: https://twitter.com/vinds71
    - name: telegram
      url: https://t.me/still_trash

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]


outputs:
  home:
    - HTML
    - RSS
    - JSON # is necessary
